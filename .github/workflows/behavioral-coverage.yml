name: Behavioral Coverage Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Advisory behavioral coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Run advisory coverage audit
        run: node tools/audit-behavioral-coverage.mjs --mode advisory

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: behavioral-coverage-report
          path: |
            artifacts/behavioral-coverage-report.json
            artifacts/behavioral-coverage-report.md
          if-no-files-found: warn
          retention-days: 14
