name: Validate rereview sequence enforcement

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate-rereview-sequence:
    name: Validate rereview sequence enforcement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout exact pull-request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Assert exact clean pull-request head
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies without scripts
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate owner policy and remaining Merge gates
        run: |
          npm run test:aigov-v3-exception
          npm run test:aigov-v4-hardening
      - name: Publish advisory-review policy evidence
        run: |
          node --input-type=module -e "import {writeFileSync} from 'node:fs';writeFileSync('aigov-owner-review-policy.json',JSON.stringify({independent_review_required:false,independent_review_policy:'optional_advisory',review_merge_authority:false,exact_head_sha:process.env.GITHUB_SHA},null,2)+'\\n')"
      - name: Upload owner-policy evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-owner-review-policy
          path: aigov-owner-review-policy.json
          if-no-files-found: error
          retention-days: 14
