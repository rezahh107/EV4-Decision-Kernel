name: Validate MVK

on:
  pull_request:

permissions:
  contents: read

jobs:
  external-coverage-trust:
    name: External Coverage Trust Gate
    uses: rezahh107/PR-Inspector/.github/workflows/coverage-trust-gate.yml@7a21045366bb9ad1ca2f950b8341ebb867dd8a52
    permissions:
      contents: read
      pull-requests: read
      id-token: write

  validate-mvk:
    name: Validate MVK
    needs: external-coverage-trust
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout externally verified exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact-head Coverage boundary
        shell: bash
        env:
          COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
          COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
          COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
          COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
        run: |
          set -euo pipefail
          git reset --hard "${COVERAGE_HEAD_SHA}"
          git clean -ffdx
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          npm ci
          npm run validate:coverage

  coverage-diagnostics:
    name: Coverage failure diagnostics
    needs: external-coverage-trust
    if: ${{ always() && needs.external-coverage-trust.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
      COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
      COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
      COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
    steps:
      - name: Checkout externally verified exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard "${COVERAGE_HEAD_SHA}"
          git clean -ffdx
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture production Coverage validator output
        shell: bash
        run: |
          set +e
          npm run validate:coverage > "${RUNNER_TEMP}/coverage-validation.log" 2>&1
          status=$?
          printf 'exit_code=%s\n' "${status}" > "${RUNNER_TEMP}/coverage-validation.exit"
          exit 0
      - name: Upload Coverage diagnostics and bounded repair source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-validation-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/coverage-validation.log
            ${{ runner.temp }}/coverage-validation.exit
            kernel/validator/validate-coverage-guarantee-legacy.mjs
            planning/KERNEL_EXECUTION_PLAN.md
          if-no-files-found: error
          retention-days: 7

  regression-validation:
    name: MVK and roadmap regressions
    needs:
      - external-coverage-trust
      - validate-mvk
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
      COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
      COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
      COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
    steps:
      - name: Checkout externally verified exact PR head with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact clean checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Install dependencies without scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check validation syntax
        run: |
          node --check tools/lib/aigov-v3-closure.mjs
          node --check tools/lib/pr-inspector-v1102.mjs
          node --check tools/verify-aigov-v3-exact-main.mjs
          node --check tools/validate-aigov-v4-governance.mjs
          node --check tools/validate-roadmap-memory.mjs
          node --check tools/validate-roadmap-memory-v4-owner-policy.mjs
          node --check tools/test-aigov-v3-exception.mjs
          node --check tools/test-aigov-v4-hardening.mjs
          node --check tools/test-recovery-program-lifecycle.mjs
          node --check kernel/validator/validate-recovery-execution-program.mjs

      - name: Validate patch whitespace and exact scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --check "${COVERAGE_BASE_SHA}..${COVERAGE_HEAD_SHA}"
          npm run aigov:scope-disclosure:batch-b -- \
            --base "${COVERAGE_BASE_SHA}" \
            --head "${COVERAGE_HEAD_SHA}" \
            --output "${RUNNER_TEMP}/aigov-owner-policy-activation-scope.json"

      - name: Validate owner policy, AIGOV and Recovery lifecycle
        env:
          AIGOV_V4_REPORT: ${{ runner.temp }}/aigov-owner-policy-report.json
        run: |
          set -euo pipefail
          npm run validate:aigov
          npm run test:aigov-v3-exception
          npm run test:aigov-v4-hardening
          npm run validate:recovery-program
          npm run test:recovery-lifecycle
          npm run validate:roadmap-memory
          npm run validate:coverage
          npm run validate:mvk

      - name: Verify PR #50 closure against exact current main
        run: >-
          node tools/verify-aigov-v3-exact-main.mjs
          --mode batch-b-policy-preview
          --source-main-sha "${COVERAGE_BASE_SHA}"
          --output "${RUNNER_TEMP}/aigov-v4-batch-b-owner-policy-preview.json"

      - name: Upload exact-head owner-policy evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-owner-policy-recovery-activation-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/aigov-owner-policy-activation-scope.json
            ${{ runner.temp }}/aigov-owner-policy-report.json
            ${{ runner.temp }}/aigov-v4-batch-b-owner-policy-preview.json
          if-no-files-found: error
          retention-days: 30
