name: Apply bounded PRF-001 through PRF-003 repair

on:
  push:
    branches:
      - dcov/coverage-guarantee-activation
    paths:
      - tools/apply-prf-001-003-repair.py
      - .github/workflows/apply-prf-001-003-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact repair head with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dcov/coverage-guarantee-activation
          fetch-depth: 0

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Apply, validate, commit and push bounded repair
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply-prf-001-003-repair.py
