name: Add history hydrator to Coverage impact

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  update-impact:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dcov/coverage-guarantee-activation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dcov/coverage-guarantee-activation
          fetch-depth: 0
          persist-credentials: true

      - name: Update impact record, remove temporary files, commit and push
        shell: bash
        run: |
          set -euo pipefail
          python tools/add-history-hydrator-impact.py
