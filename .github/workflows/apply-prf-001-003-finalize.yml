name: Apply final bounded PRF-001 through PRF-003 repair

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  finalize-repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dcov/coverage-guarantee-activation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact repair branch with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dcov/coverage-guarantee-activation
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Harden finalizer against validated drift
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply-prf-001-003-finalize.py')
          text = path.read_text(encoding='utf-8')
          old = '''plan, count = re.subn(
              r"# Coverage Execution Program — Active[\\s\\S]*?(?=\\n# Roadmap Items)",
              replacement.rstrip(),
              plan,
              count=1,
          )
          if count != 1:
              raise SystemExit("active Coverage program section was not found")
          plan = plan.replace("- **Status:** superseded_by_coverage_execution_program", "- **Status:** not_started")
          plan = re.sub(r"\\n- \\*\\*Unified execution mapping:\\*\\*[^\\n]*", "", plan)
          '''
          new = '''if "**Status:** proposed" not in plan:
              plan = plan.replace("---", "---\\n\\n" + replacement.rstrip() + "\\n", 1)
          plan = plan.replace("Coverage Execution Program — Active", "Coverage Execution Program — Proposed, Non-Executable")
          plan = plan.replace("replaces KROAD-012 through KROAD-018", "does not replace KROAD-012 through KROAD-018")
          plan = plan.replace("- **Status:** superseded_by_coverage_execution_program", "- **Status:** not_started")
          plan = re.sub(r"\\n- \\*\\*Unified execution mapping:\\*\\*[^\\n]*", "", plan)
          '''
          if old not in text:
              raise SystemExit('finalizer heading block not found')
          text = text.replace(old, new)

          marker = '''legacy = legacy.replace(
              "const policyActive = mainDiagnostics.length === 0 && fixturesPassed;",'''
          bootstrap = '''legacy, bootstrap_count = re.subn(
              r"impact\\.reason === 'introduces_the_coverage_measurement_system'\\s*&& impact\\.coverage_state_before === 'not_measurable'\\s*&& impact\\.coverage_state_after === 'policy_active'",
              "impact.reason === 'introduces_proposed_coverage_measurement_system_pending_external_promotion'\\n        && impact.coverage_state_before === 'not_measurable'\\n        && impact.coverage_state_after === 'not_measurable'",
              legacy,
              count=1,
          )
          if bootstrap_count != 1:
              raise SystemExit("bootstrap proposal condition replacement failed")
          '''
          if marker not in text:
              raise SystemExit('legacy policy marker not found')
          text = text.replace(marker, bootstrap + marker)

          removal_marker = '''# Remove temporary execution carriers before computing the committed diff.'''
          baseline = '''baseline_path = "planning/coverage/coverage-baseline.v1.json"
          baseline = load(baseline_path)
          contract_text = read("kernel/decision-governance/coverage-guarantee-contract.v1.json")
          contract_hash = __import__("hashlib").sha256(contract_text.encode("utf-8")).hexdigest()
          for item in baseline["content_hashes"]:
              if item["path"] == "kernel/decision-governance/coverage-guarantee-contract.v1.json":
                  item["sha256"] = contract_hash
          dump(baseline_path, baseline)

          '''
          if removal_marker not in text:
              raise SystemExit('baseline insertion marker not found')
          text = text.replace(removal_marker, baseline + removal_marker)
          path.write_text(text, encoding='utf-8')
          PY
          sed -i '\|planning/reviews/KROAD-012R_RECOVERY_SPEC_INTEGRATION_REVIEW.md|d' tools/apply-prf-001-003-finalize.py

      - name: Apply and validate final bounded repair
        id: repair
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python tools/apply-prf-001-003-finalize.py > repair-finalizer.log 2>&1

      - name: Upload finalizer diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prf-001-003-finalizer-diagnostics
          path: repair-finalizer.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail closed when finalizer failed
        if: ${{ steps.repair.outcome != 'success' }}
        shell: bash
        run: |
          cat repair-finalizer.log
          exit 1
