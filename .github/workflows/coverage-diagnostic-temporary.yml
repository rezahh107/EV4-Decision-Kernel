name: Apply final Coverage legacy compatibility repair

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  repair-coverage-legacy:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dcov/coverage-guarantee-activation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact repair branch with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dcov/coverage-guarantee-activation
          fetch-depth: 0
          show-progress: false
          persist-credentials: true

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Apply bounded legacy compatibility repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          validator = Path('kernel/validator/validate-coverage-guarantee-legacy.mjs')
          text = validator.read_text(encoding='utf-8')
          old = "  if (packageJson.scripts?.['validate:coverage'] !== 'node kernel/validator/validate-coverage-guarantee.mjs') {"
          new = """  const validateCoverageScript = packageJson.scripts?.['validate:coverage'];
            const allowedCoverageScripts = new Set([
              'node kernel/validator/validate-coverage-guarantee.mjs',
              'node kernel/validator/validate-coverage-guarantee-history.mjs && node kernel/validator/validate-coverage-guarantee.mjs',
            ]);
            if (!allowedCoverageScripts.has(validateCoverageScript)) {"""
          if text.count(old) != 1:
              raise SystemExit('legacy validate:coverage wiring anchor mismatch')
          validator.write_text(text.replace(old, new, 1), encoding='utf-8')

          Path('.github/workflows/coverage-diagnostic-temporary.yml').unlink()
          PY

      - name: Validate final exact repair tree
        shell: bash
        env:
          COVERAGE_REPOSITORY: ${{ github.repository }}
          COVERAGE_PR_NUMBER: ${{ github.event.pull_request.number }}
          COVERAGE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COVERAGE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          node --check kernel/validator/validate-coverage-guarantee.mjs
          node --check kernel/validator/validate-coverage-guarantee-prf010.mjs
          node --check kernel/validator/validate-coverage-guarantee-legacy.mjs
          npm ci
          npm run validate:coverage
          npm run validate:mvk
          npm run validate:roadmap-memory
          node tools/validate-kroad-010-prototype-integrity.mjs
          npm run validate:kroad-010-history-matrix
          git diff --check

      - name: Commit final repair and remove temporary carrier
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add kernel/validator/validate-coverage-guarantee-legacy.mjs \
            .github/workflows/coverage-diagnostic-temporary.yml
          git commit -m "fix(coverage): accept history-hydrated validation entrypoint"
          git push origin HEAD:dcov/coverage-guarantee-activation
