name: Validate MVK

on:
  pull_request:

permissions:
  contents: read

jobs:
  external-coverage-trust:
    name: External Coverage Trust Gate
    uses: rezahh107/PR-Inspector/.github/workflows/coverage-trust-gate.yml@7a21045366bb9ad1ca2f950b8341ebb867dd8a52
    permissions:
      contents: read
      pull-requests: read
      id-token: write

  validate-mvk:
    name: Validate MVK
    needs: external-coverage-trust
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout externally verified exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact-head Coverage boundary
        shell: bash
        env:
          COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
          COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
          COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
          COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
        run: |
          set -euo pipefail
          git reset --hard "${COVERAGE_HEAD_SHA}"
          git clean -ffdx
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          npm ci
          npm run validate:coverage

  regression-validation:
    name: MVK and roadmap regressions
    needs:
      - external-coverage-trust
      - validate-mvk
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout externally verified exact PR head with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact clean checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.external-coverage-trust.outputs.verified_head_sha }}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run preserved syntax and regression validation
        shell: bash
        env:
          COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
          COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
          COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
          COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
        run: |
          set -euo pipefail
          node --check kernel/validator/validate-coverage-guarantee.mjs
          node --check kernel/validator/validate-coverage-guarantee-prf010.mjs
          node --check kernel/validator/validate-coverage-guarantee-legacy.mjs
          git diff --check
          git diff --check "${COVERAGE_BASE_SHA}..${COVERAGE_HEAD_SHA}"
          npm run validate:mvk
          npm run validate:roadmap-memory
          node tools/validate-kroad-010-prototype-integrity.mjs
          npm run validate:kroad-010-history-matrix

      - name: Upload KROAD-010 history matrix evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kroad-010-history-matrix
          path: kroad-010-history-matrix-report.json
          if-no-files-found: error
          retention-days: 14
