name: Behavioral Coverage Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Behavioral coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify immutable action pins
        shell: bash
        run: |
          set -euo pipefail
          violations="$({
            grep -RnhE '^[[:space:]]*uses:[[:space:]]*[^[:space:]]+@' .github/workflows \
              --include='*.yml' --include='*.yaml' || true
          } | grep -Ev 'uses:[[:space:]]*(\./|docker://)|@[0-9a-fA-F]{40}([[:space:]]*(#.*)?)$' || true)"

          if [[ -n "$violations" ]]; then
            echo "External GitHub Actions must be pinned to full 40-character commit SHAs." >&2
            echo "$violations" >&2
            exit 1
          fi

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Run advisory coverage audit
        run: node tools/audit-behavioral-coverage.mjs --mode advisory

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: behavioral-coverage-report
          path: |
            artifacts/behavioral-coverage-report.json
            artifacts/behavioral-coverage-report.md
          if-no-files-found: warn
          retention-days: 14
