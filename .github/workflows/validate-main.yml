name: Validate Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-main:
    name: Validate Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact main head with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Install MVK validator dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate KROAD-010 source syntax and JSON
        run: |
          node --check kernel/validator/validate-aigov-governance.mjs
          node --check kernel/validator/validate-downstream-consumer-contract.mjs
          node --check kernel/validator/validate-downstream-consumer-canonical-lock.mjs
          node --check kernel/validator/validate-downstream-consumer-lineage.mjs
          node --check tools/validate-kroad-010-primary-baseline.mjs
          node --check tools/validate-kroad-010-prototype-integrity.mjs
          node --check tools/validate-kroad-010-history-matrix.mjs
          node --check tools/generate-aigov-scope-disclosure.mjs
          node --check tools/materialize-aigov-lifecycle.mjs
          node --check tools/run-aigov-validation-suite.mjs
          node --check tools/test-aigov-forbidden-operations.mjs
          node --check tools/test-aigov-owner-evidence.mjs
          node --check tools/test-aigov-provenance.mjs
          node --check tools/test-aigov-sequence.mjs
          node --check tools/verify-aigov-exact-main.mjs
          node --check tools/kroad-010-history/common.mjs
          node --check tools/kroad-010-history/build.mjs
          node --check tools/kroad-010-history/validate.mjs
          node -e "for (const p of process.argv.slice(1)) JSON.parse(require('node:fs').readFileSync(p, 'utf8'))" \
            kernel/decision-governance/downstream-consumer-contract.v0.json \
            kernel/decision-governance/downstream-consumer-lineage-binding.v0.json \
            kernel/fixtures/contract-lock/downstream_consumer/canonical_lock_mutations.json \
            kernel/fixtures/contract-lock/downstream_consumer/primary-validator-baseline.v0.json \
            kernel/fixtures/history-matrix/downstream_consumer/history-matrix.v0.json

      - name: Validate patch whitespace
        run: git diff --check

      - name: Validate MVK fixtures and gates
        env:
          COVERAGE_REPOSITORY: ${{ github.repository }}
          COVERAGE_BASE_SHA: ${{ github.event.before }}
          COVERAGE_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "${COVERAGE_REPOSITORY}" = "rezahh107/EV4-Decision-Kernel"
          test "${COVERAGE_BASE_SHA}" != "0000000000000000000000000000000000000000"
          [[ "${COVERAGE_BASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${COVERAGE_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          git merge-base --is-ancestor "${COVERAGE_BASE_SHA}" "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          npm run validate:mvk

      - name: Validate roadmap memory consistency
        if: ${{ always() }}
        run: npm run validate:roadmap-memory

      - name: Validate exact-main Batch A scope projection
        shell: bash
        env:
          AIGOV_BASE_SHA: ${{ github.event.before }}
          AIGOV_MAIN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "${AIGOV_BASE_SHA}" = "5ff5d7b20db11af36ab787eb8ac2d1127ea74644"
          test "$(git rev-parse HEAD)" = "${AIGOV_MAIN_SHA}"
          npm run aigov:scope-disclosure -- \
            --base "${AIGOV_BASE_SHA}" \
            --head "${AIGOV_MAIN_SHA}"

      - name: Verify KROAD-010 prototype integrity
        if: ${{ always() }}
        run: node tools/validate-kroad-010-prototype-integrity.mjs

      - name: Validate KROAD-010 merge/squash/rebase history matrix
        id: history-matrix
        if: ${{ always() }}
        run: npm run validate:kroad-010-history-matrix

      - name: Materialize Batch A exact-main scope projection
        shell: bash
        env:
          AIGOV_BASE_SHA: ${{ github.event.before }}
          AIGOV_MAIN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          npm run aigov:scope-disclosure -- \
            --base "${AIGOV_BASE_SHA}" \
            --head "${AIGOV_MAIN_SHA}" \
            --output "aigov-batch-a-main-scope-${AIGOV_MAIN_SHA}.json"

      - name: Upload KROAD-010 history matrix evidence
        if: ${{ always() && steps.history-matrix.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kroad-010-history-matrix-main
          path: kroad-010-history-matrix-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Batch A exact-main scope projection
        if: ${{ success() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-batch-a-main-scope-${{ github.sha }}
          path: aigov-batch-a-main-scope-${{ github.sha }}.json
          if-no-files-found: error
          retention-days: 14
