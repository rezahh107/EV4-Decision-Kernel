name: Validate MVK

on:
  pull_request:

permissions:
  contents: read

jobs:
  external-coverage-trust:
    name: External Coverage Trust Gate
    uses: rezahh107/PR-Inspector/.github/workflows/coverage-trust-gate.yml@7a21045366bb9ad1ca2f950b8341ebb867dd8a52
    permissions:
      contents: read
      pull-requests: read
      id-token: write

  validate-mvk:
    name: Validate MVK
    needs: external-coverage-trust
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout externally verified exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact-head Coverage boundary
        shell: bash
        env:
          COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
          COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
          COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
          COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
        run: |
          set -euo pipefail
          git reset --hard "${COVERAGE_HEAD_SHA}"
          git clean -ffdx
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          npm ci
          npm run validate:coverage

  regression-validation:
    name: MVK and roadmap regressions
    needs:
      - external-coverage-trust
      - validate-mvk
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AIGOV_GITHUB_TOKEN: ${{ github.token }}
      COVERAGE_REPOSITORY: ${{ needs.external-coverage-trust.outputs.verified_repository }}
      COVERAGE_PR_NUMBER: ${{ needs.external-coverage-trust.outputs.verified_pr_number }}
      COVERAGE_BASE_SHA: ${{ needs.external-coverage-trust.outputs.verified_base_sha }}
      COVERAGE_HEAD_SHA: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
      PR_INSPECTOR_ROOT: ${{ github.workspace }}/_external/pr-inspector
    steps:
      - name: Checkout externally verified exact PR head with history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.external-coverage-trust.outputs.verified_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact clean checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Checkout pinned PR Inspector v1.10.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: rezahh107/PR-Inspector
          ref: 9ed48bd995ee5b9270756254b04c1d48ccf21cbe
          path: _external/pr-inspector
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install pinned PR Inspector runtime dependencies
        run: python -m pip install --disable-pip-version-check --no-input jsonschema==4.26.0 PyYAML==6.0.3

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check validation syntax
        run: |
          node --check kernel/validator/validate-aigov-governance.mjs
          node --check kernel/validator/validate-coverage-guarantee.mjs
          node --check kernel/validator/validate-coverage-guarantee-prf010.mjs
          node --check kernel/validator/validate-coverage-guarantee-legacy.mjs
          node --check kernel/validator/validate-recovery-execution-program.mjs
          node --check tools/lib/aigov-ci-descriptor.mjs
          node --check tools/lib/aigov-v3-closure.mjs
          node --check tools/lib/aigov-sequence-producer-v1102.mjs
          node --check tools/lib/pr-inspector-v1102.mjs
          node --check tools/test-aigov-v3-exception.mjs
          node --check tools/test-aigov-v4-hardening.mjs
          node --check tools/validate-aigov-v4-governance.mjs
          node --check tools/verify-aigov-exact-main.mjs
          node --check tools/verify-aigov-v3-exact-main.mjs
          node --check tools/generate-aigov-scope-disclosure.mjs
          node --check tools/generate-aigov-v3-batch-b-scope.mjs
          node --check tools/materialize-aigov-lifecycle.mjs
          node --check tools/materialize-pr-inspector-rereview-sequence.mjs
          node --check tools/finalize-aigov-post-ci-evidence.mjs
          node --check tools/index-aigov-post-ci-artifact.mjs
          node --check tools/assemble-aigov-post-ci-payload.mjs
          node --check tools/assemble-aigov-validation-evidence.mjs
          node --check tools/wait-for-aigov-source-ci.mjs
          node --check tools/run-aigov-validation-suite.mjs
          node --check tools/validate-roadmap-memory.mjs
          node --check tools/validate-roadmap-memory-v3.mjs
          node --check tools/validate-roadmap-memory-full.mjs
          node --check tools/validate-kroad-010-history-matrix.mjs
          node --check tools/test-kroad-010-history-matrix-fail-closed.mjs
          node --check tools/test-aigov-forbidden-operations.mjs
          node --check tools/test-aigov-owner-evidence.mjs
          node --check tools/test-aigov-provenance.mjs
          node --check tools/test-aigov-sequence.mjs
          node --check tools/test-aigov-sequence-producer.mjs
          python -m py_compile tools/pr-inspector-official-boundary-v1102.py tools/test-pr-inspector-security-capability.py

      - name: Check working tree and base-to-head diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --check "${COVERAGE_BASE_SHA}..${COVERAGE_HEAD_SHA}"

      - name: Disclose and validate exact Batch B scope
        shell: bash
        run: |
          set -euo pipefail
          test "${COVERAGE_BASE_SHA}" = "86e25a9073df7e257ca7df799de85baf9b3fafb0"
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          npm run aigov:scope-disclosure:batch-b -- \
            --base "${COVERAGE_BASE_SHA}" \
            --head "${COVERAGE_HEAD_SHA}" \
            --output "${RUNNER_TEMP}/aigov-v4-batch-b-scope-disclosure.json"

      - name: Reconcile Batch A through exact V4 squash equivalence
        id: batch-a-reconciliation
        continue-on-error: true
        run: npm run validate:aigov-v4-batch-a-reconciliation -- --output "${RUNNER_TEMP}/aigov-v4-batch-a-reconciliation.json"

      - name: Upload Batch A reconciliation diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-v4-batch-a-reconciliation-diagnostics-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/aigov-v4-batch-a-reconciliation.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce Batch A reconciliation result
        if: ${{ steps.batch-a-reconciliation.outcome != 'success' }}
        run: exit 1

      - name: Validate V4 exception and merge-method misuse cases
        run: npm run test:aigov-v3-exception

      - name: Validate AIGOV contracts
        env:
          AIGOV_V4_REPORT: ${{ runner.temp }}/aigov-v4-governance-report.json
        run: npm run validate:aigov

      - name: Upload AIGOV V4 governance diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-v4-governance-diagnostics-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/aigov-v4-governance-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Validate AIGOV fixtures
        run: npm run test:aigov-fixtures

      - name: Validate AIGOV sequence
        run: npm run test:aigov-sequence

      - name: Validate AIGOV behavioral coverage
        run: npm run validate:behavioral-coverage:aigov

      - name: Validate roadmap memory
        shell: bash
        run: |
          set -o pipefail
          npm run validate:roadmap-memory 2>&1 | tee "${RUNNER_TEMP}/aigov-v4-roadmap-memory.log"

      - name: Upload AIGOV V4 roadmap diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-v4-roadmap-diagnostics-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/aigov-v4-roadmap-memory.log
          if-no-files-found: error
          retention-days: 14

      - name: Relocate pinned inspector outside the target worktree
        shell: bash
        run: |
          set -euo pipefail
          mv _external/pr-inspector "${RUNNER_TEMP}/pr-inspector"
          rmdir _external
          echo "PR_INSPECTOR_ROOT=${RUNNER_TEMP}/pr-inspector" >> "${GITHUB_ENV}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Validate Coverage boundary
        run: npm run validate:coverage

      - name: Validate recovery-program registration
        run: npm run validate:recovery-program

      - name: Validate full MVK regression suite
        shell: bash
        run: |
          set -o pipefail
          npm run validate:mvk 2>&1 | tee "${RUNNER_TEMP}/aigov-v4-full-mvk.log"

      - name: Upload full MVK diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-v4-full-mvk-diagnostics-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/aigov-v4-full-mvk.log
          if-no-files-found: error
          retention-days: 14

      - name: Test fail-closed history diagnostics
        run: npm run test:kroad-010-history-matrix-fail-closed

      - name: Verify KROAD-010 prototype integrity
        run: node tools/validate-kroad-010-prototype-integrity.mjs

      - name: Validate KROAD-010 history matrix
        id: history-matrix
        run: npm run validate:kroad-010-history-matrix

      - name: Upload KROAD-010 history matrix evidence
        if: ${{ always() && steps.history-matrix.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kroad-010-history-matrix
          path: kroad-010-history-matrix-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact-head V4 Batch B evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-v4-batch-b-validation-evidence
          path: |
            ${{ runner.temp }}/aigov-v4-batch-a-reconciliation.json
            ${{ runner.temp }}/aigov-v4-batch-b-scope-disclosure.json
          if-no-files-found: error
          retention-days: 14
