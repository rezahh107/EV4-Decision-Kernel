name: Publish PRF-013 Head Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  authoritative-coverage-trust:
    name: Resolve authoritative PR identity
    uses: rezahh107/PR-Inspector/.github/workflows/coverage-trust-gate.yml@73b8e3857dbc1596fe7b04def04b94f2609440b2
    permissions:
      contents: read
      pull-requests: read
      id-token: write

  publish-head-check:
    name: Publish trusted head-associated result
    needs: authoritative-coverage-trust
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail closed unless GitHub App configuration exists
        shell: bash
        env:
          COVERAGE_TRUST_APP_ID: ${{ vars.COVERAGE_TRUST_APP_ID }}
          COVERAGE_TRUST_APP_PRIVATE_KEY: ${{ secrets.COVERAGE_TRUST_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${COVERAGE_TRUST_APP_ID}"
          test "${COVERAGE_TRUST_APP_ID}" -gt 0
          test -n "${COVERAGE_TRUST_APP_PRIVATE_KEY}"
          test "${{ needs.authoritative-coverage-trust.outputs.proof_credit_authorized }}" = "false"

      - name: Check out immutable publisher implementation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: rezahh107/PR-Inspector
          ref: 73b8e3857dbc1596fe7b04def04b94f2609440b2
          fetch-depth: 1
          path: issuer
          persist-credentials: false

      - name: Mint short-lived GitHub App installation token
        id: app-token
        shell: bash
        env:
          COVERAGE_TRUST_APP_ID: ${{ vars.COVERAGE_TRUST_APP_ID }}
          COVERAGE_TRUST_APP_PRIVATE_KEY: ${{ secrets.COVERAGE_TRUST_APP_PRIVATE_KEY }}
          GH_API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "${COVERAGE_TRUST_APP_PRIVATE_KEY}" > app-private-key.pem
          now="$(date +%s)"
          issued_at="$((now - 60))"
          expires_at="$((now + 540))"
          header="$({ printf '%s' '{"alg":"RS256","typ":"JWT"}'; } | base64 -w0 | tr '+/' '-_' | tr -d '=')"
          payload="$({ printf '{"iat":%s,"exp":%s,"iss":"%s"}' "${issued_at}" "${expires_at}" "${COVERAGE_TRUST_APP_ID}"; } | base64 -w0 | tr '+/' '-_' | tr -d '=')"
          unsigned="${header}.${payload}"
          signature="$(printf '%s' "${unsigned}" | openssl dgst -sha256 -sign app-private-key.pem | base64 -w0 | tr '+/' '-_' | tr -d '=')"
          app_jwt="${unsigned}.${signature}"

          installation_id="$(
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer ${app_jwt}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "${GH_API_URL}/repos/rezahh107/EV4-Decision-Kernel/installation" \
            | python -c 'import json,sys; print(json.load(sys.stdin)["id"])'
          )"
          installation_token="$(
            curl --fail-with-body --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${app_jwt}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "${GH_API_URL}/app/installations/${installation_id}/access_tokens" \
            | python -c 'import json,sys; print(json.load(sys.stdin)["token"])'
          )"
          echo "::add-mask::${installation_token}"
          delimiter="APP_TOKEN_$(openssl rand -hex 12)"
          {
            echo "token<<${delimiter}"
            echo "${installation_token}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
          rm -f app-private-key.pem

      - name: Publish exact-head check from expected GitHub App
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          EXPECTED_APP_ID: ${{ vars.COVERAGE_TRUST_APP_ID }}
          GH_API_URL: ${{ github.api_url }}
          VERIFIED_REPOSITORY: ${{ needs.authoritative-coverage-trust.outputs.verified_repository }}
          VERIFIED_REPOSITORY_ID: ${{ needs.authoritative-coverage-trust.outputs.verified_repository_id }}
          VERIFIED_PR_NUMBER: ${{ needs.authoritative-coverage-trust.outputs.verified_pr_number }}
          VERIFIED_BASE_SHA: ${{ needs.authoritative-coverage-trust.outputs.verified_base_sha }}
          VERIFIED_HEAD_SHA: ${{ needs.authoritative-coverage-trust.outputs.verified_head_sha }}
          VERIFIED_ISSUER_SHA: ${{ needs.authoritative-coverage-trust.outputs.verified_issuer_sha }}
          ATTESTATION_DIGEST: ${{ needs.authoritative-coverage-trust.outputs.attestation_digest }}
        run: |
          set -euo pipefail
          test "${VERIFIED_HEAD_SHA}" != "${VERIFIED_BASE_SHA}"
          python issuer/scripts/publish_coverage_check.py \
            --api-url "${GH_API_URL}" \
            --token "${APP_TOKEN}" \
            --repository "${VERIFIED_REPOSITORY}" \
            --repository-id "${VERIFIED_REPOSITORY_ID}" \
            --pull-request-number "${VERIFIED_PR_NUMBER}" \
            --base-sha "${VERIFIED_BASE_SHA}" \
            --head-sha "${VERIFIED_HEAD_SHA}" \
            --issuer-workflow-sha "${VERIFIED_ISSUER_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --attestation-digest "${ATTESTATION_DIGEST}" \
            --expected-app-id "${EXPECTED_APP_ID}" \
            --output coverage-trust-check-evidence.json

      - name: Upload protected head-check evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prf-013-head-check-${{ needs.authoritative-coverage-trust.outputs.verified_head_sha }}
          path: coverage-trust-check-evidence.json
          if-no-files-found: error
          retention-days: 30
