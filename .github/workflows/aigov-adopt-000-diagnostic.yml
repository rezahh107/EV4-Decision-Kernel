name: AIGOV ADOPT 000 Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ github.event.pull_request.number == 48 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        id: syntax
        continue-on-error: true
        run: |
          node --check kernel/validator/validate-coverage-guarantee.mjs
          node --check kernel/validator/validate-coverage-guarantee-prf010.mjs
          node --check kernel/validator/validate-coverage-guarantee-legacy.mjs

      - name: Working-tree diff check
        id: diff_worktree
        continue-on-error: true
        run: git diff --check

      - name: Base-to-head diff check
        id: diff_range
        continue-on-error: true
        run: git diff --check "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Validate MVK
        id: mvk
        continue-on-error: true
        env:
          COVERAGE_REPOSITORY: ${{ github.repository }}
          COVERAGE_PR_NUMBER: ${{ github.event.pull_request.number }}
          COVERAGE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COVERAGE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run validate:mvk

      - name: Validate roadmap memory
        id: roadmap
        continue-on-error: true
        run: npm run validate:roadmap-memory

      - name: Verify KROAD-010 prototype integrity
        id: prototype
        continue-on-error: true
        run: node tools/validate-kroad-010-prototype-integrity.mjs

      - name: Validate KROAD-010 history matrix
        id: history
        continue-on-error: true
        run: npm run validate:kroad-010-history-matrix

      - name: Report exact outcomes
        if: ${{ always() }}
        env:
          SYNTAX: ${{ steps.syntax.outcome }}
          DIFF_WORKTREE: ${{ steps.diff_worktree.outcome }}
          DIFF_RANGE: ${{ steps.diff_range.outcome }}
          MVK: ${{ steps.mvk.outcome }}
          ROADMAP: ${{ steps.roadmap.outcome }}
          PROTOTYPE: ${{ steps.prototype.outcome }}
          HISTORY: ${{ steps.history.outcome }}
        run: |
          printf '%s\n' \
            "syntax=${SYNTAX}" \
            "diff_worktree=${DIFF_WORKTREE}" \
            "diff_range=${DIFF_RANGE}" \
            "mvk=${MVK}" \
            "roadmap=${ROADMAP}" \
            "prototype=${PROTOTYPE}" \
            "history=${HISTORY}"
          test "${SYNTAX}" = success
          test "${DIFF_WORKTREE}" = success
          test "${DIFF_RANGE}" = success
          test "${MVK}" = success
          test "${ROADMAP}" = success
          test "${PROTOTYPE}" = success
          test "${HISTORY}" = success
