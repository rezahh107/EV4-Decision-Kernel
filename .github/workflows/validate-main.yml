name: Validate Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-main:
    name: Validate Main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COVERAGE_REPOSITORY: ${{ github.repository }}
      COVERAGE_IDENTITY_MODE: post_merge
      COVERAGE_BASE_SHA: ${{ github.event.before }}
      COVERAGE_HEAD_SHA: ${{ github.sha }}
    steps:
      - name: Checkout exact main head with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact clean main checkout
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies without scripts
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Check source syntax and deterministic JSON
        run: |
          node --check tools/lib/aigov-v3-closure.mjs
          node --check tools/lib/pr-inspector-v1102.mjs
          node --check tools/verify-aigov-v3-exact-main.mjs
          node --check tools/validate-aigov-v4-governance.mjs
          node --check tools/validate-roadmap-memory.mjs
          node --check tools/validate-roadmap-memory-v4-owner-policy.mjs
          node --check tools/test-aigov-v3-exception.mjs
          node --check tools/test-aigov-v4-hardening.mjs
          node --check tools/test-recovery-program-lifecycle.mjs
          node --check tools/test-recovery-ledger-lifecycle.mjs
          node --check tools/test-coverage-impact-governance.mjs
          node --check kernel/validator/coverage-work-package-id.mjs
          node --check kernel/validator/validate-coverage-guarantee.mjs
          node --check kernel/validator/validate-coverage-guarantee-owner-policy.mjs
          node --check kernel/validator/validate-recovery-execution-program.mjs
          node --check kernel/validator/validate-recovery-ledger.mjs
          node -e "for (const p of process.argv.slice(1)) JSON.parse(require('node:fs').readFileSync(p,'utf8'))" \
            kernel/decision-governance/aigov-repository-policy.v1.json \
            kernel/schemas/aigov-repository-policy.v1.schema.json \
            kernel/schemas/recovery-ledger.v1.schema.json \
            kernel/schemas/recovery-execution-program.v1.schema.json \
            kernel/fixtures/recovery-ledger/adversarial/cases.json \
            kernel/fixtures/recovery-ledger/invalid/cases.json \
            kernel/fixtures/recovery-ledger/valid/cases.json \
            planning/recovery/recovery-ledger.v1.json \
            planning/recovery/recovery-execution-program.v1.json \
            planning/governance/scopes/krec-001-recovery-ledger.scope.json \
            planning/governance/scopes/aigov-owner-policy-recovery-activation.scope.json
      - name: Validate patch whitespace
        run: git diff --check
      - name: Validate MVK, AIGOV, Coverage and Recovery activation
        run: |
          set -euo pipefail
          test "${COVERAGE_REPOSITORY}" = "rezahh107/EV4-Decision-Kernel"
          test "${COVERAGE_IDENTITY_MODE}" = "post_merge"
          test -z "${COVERAGE_PR_NUMBER:-}"
          [[ "${COVERAGE_BASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${COVERAGE_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${COVERAGE_HEAD_SHA}"
          git merge-base --is-ancestor "${COVERAGE_BASE_SHA}" "${COVERAGE_HEAD_SHA}"
          npm run validate:aigov-v4-batch-a-reconciliation
          npm run validate:mvk
          npm run validate:roadmap-memory
          npm run validate:coverage
          npm run validate:recovery-program
          npm run validate:recovery-ledger
          npm run test:recovery-ledger-lifecycle
      - name: Validate activation scope when applicable
        run: |
          set -euo pipefail
          if [ "${COVERAGE_BASE_SHA}" = "5b25e9e7f43071e1ac5a7e5e798a3600838e5b2a" ]; then
            npm run aigov:scope-disclosure:batch-b -- \
              --base "${COVERAGE_BASE_SHA}" \
              --head "${COVERAGE_HEAD_SHA}" \
              --scope planning/governance/scopes/krec-001-recovery-ledger.scope.json \
              --output "aigov-owner-policy-main-scope-${COVERAGE_HEAD_SHA}.json"
          elif [ "${COVERAGE_BASE_SHA}" = "435add8ee3f3274f781b6e391f11e3262e380c4e" ]; then
            npm run aigov:scope-disclosure:batch-b -- \
              --base "${COVERAGE_BASE_SHA}" \
              --head "${COVERAGE_HEAD_SHA}" \
              --output "aigov-owner-policy-main-scope-${COVERAGE_HEAD_SHA}.json"
          else
            printf '{"status":"not_applicable","reason":"activation_scope_base_not_current_push"}\n' > "aigov-owner-policy-main-scope-${COVERAGE_HEAD_SHA}.json"
          fi
      - name: Verify KROAD-010 prototype integrity
        run: node tools/validate-kroad-010-prototype-integrity.mjs
      - name: Validate KROAD-010 history matrix
        run: npm run validate:kroad-010-history-matrix
      - name: Upload exact-main validation evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aigov-owner-policy-main-${{ github.sha }}
          path: aigov-owner-policy-main-scope-${{ github.sha }}.json
          if-no-files-found: error
          retention-days: 30
